<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Visa Appointment Assistant</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header>
      <div>
        <h1>AI Visa Appointment Assistant</h1>
        <p>Smart visa appointment tracking and availability analysis panel</p>
      </div>
      <span class="badge">AI Powered</span>
    </header>
 <main class="dashboard">
      <section class="card form-card">
        <h2>Appointment Search</h2>

        <label>Visa Country</label>
        <select id="country">
          <option>France</option>
          <option>Germany</option>
          <option>Italy</option>
          <option>Netherlands</option>
          <option>Spain</option>
        </select>

        <label>Visa Type</label>
        <select id="visaType">
          <option>Tourist Visa</option>
          <option>Student Visa</option>
          <option>Business Visa</option>
          <option>Family Visit Visa</option>
        </select>
